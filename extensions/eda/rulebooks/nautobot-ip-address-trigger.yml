---
- name: Trigger job template when IP address is created or assigned to interface
  hosts: all
  sources:
    - networktocode.nautobot.nautobot_changelog:
        instance: "{{ NAUTOBOT_URL }}"
        token: "{{ NAUTOBOT_TOKEN }}"
        interval: 5

  rules:
    - name: IP address created or updated directly
      condition: >
        event.host is defined
        and event.ip_version is defined
        and event.mask_length is defined
      action:
        run_job_template:
          name: "Nautobot Job Template"
          organization: "Default"
          extra_vars:
            event_type: "ip_address"
            ip_address: "{{ event.host }}"
            mask_length: "{{ event.mask_length }}"
            interface_name: ""
            device_id: ""

    - name: Interface updated (IP assigned or removed)
      condition: >
        event.device is defined
        and event.name is defined
        and event.enabled is defined
        and event.mgmt_only is defined
      action:
        run_job_template:
          name: "Nautobot Job Template"
          organization: "Default"
          extra_vars:
            event_type: "interface"
            ip_address: ""
            mask_length: ""
            interface_name: "{{ event.name }}"
            device_id: "{{ event.device }}"
