---
- name: Configure IP address on Arista device
  hosts: "{{ nautobot_device_name | default('localhost', true) }}"
  gather_facts: false
  connection: ansible.netcommon.network_cli
  become: true
  become_method: enable

  vars:
    ansible_network_os: arista.eos.eos
    interface_ip: "{{ nautobot_ip_address | default('') }}/{{ nautobot_mask_length | default('') }}"

  tasks:
    - name: Skip if no device was resolved
      when: nautobot_device_name | default('') == ''
      block:
        - name: Log skip
          ansible.builtin.debug:
            msg: "No device resolved from Nautobot event - skipping configuration"
        - name: End play
          ansible.builtin.meta: end_play

    - name: Show what we are configuring
      ansible.builtin.debug:
        msg:
          - "Device: {{ inventory_hostname }}"
          - "Interface: {{ nautobot_interface_name }}"
          - "IP Address: {{ interface_ip }}"
          - "Event type: {{ nautobot_event_type | default('N/A') }}"

    - name: Configure IP on interface
      arista.eos.eos_l3_interfaces:
        config:
          - name: "{{ nautobot_interface_name }}"
            ipv4:
              - address: "{{ interface_ip }}"
        state: merged
      register: config_result

    - name: Show configuration result
      ansible.builtin.debug:
        msg: "{{ config_result }}"
